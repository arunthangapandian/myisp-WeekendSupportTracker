services:
  - type: web
    name: myisp-WeekendSupportTracker
    runtime: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # ── Azure Blob Storage ─────────────────────────────────────────────────
      # Primary data store: stores all application data in a single JSON blob.
      # Set AZURE_STORAGE_CONNECTION_STRING in the Render dashboard (Secret env var).
      # Obtain the connection string from:
      #   Azure Portal → Storage account → Security + networking → Access keys
      # Never commit the connection string to source control.
      - key: AZURE_STORAGE_CONNECTION_STRING
        sync: false
      # Optional — override the container name (default: weekend-support-data)
      # - key: AZURE_STORAGE_CONTAINER
      #   value: weekend-support-data
      # Optional — override the blob file name (default: data.json)
      # - key: AZURE_STORAGE_BLOB_NAME
      #   value: data.json
