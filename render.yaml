services:
  - type: web
    name: myisp-WeekendSupportTracker
    runtime: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: myisp-db
          property: connectionString

databases:
  - name: myisp-db
    plan: free
    databaseName: myisp_data
    user: myisp_user
